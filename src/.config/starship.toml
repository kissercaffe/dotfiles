# promptのカラーを設定しています、$変数は後述で設定している変数が差し込まれます
# format = """
# $directory\
# [](fg:#88C0D0 bg:#394260)\
# $git_branch\
# $git_status\
# [](fg:#394260)\
# $fill\
# [](fg:#212736)\
# $nodejs\
# $rust\
# $golang\
# $php\
# [](fg:#1d2230 bg:#212736)\
# $time\
# [](fg:#88C0D0 bg:#1d2230)\
# $os\
# [](fg:#88C0D0)\
# \n$character"""

format = """
$directory\
[](fg:#88C0D0 bg:#394260)\
$username\
[](fg:#394260 bg:#212736)\
$git_branch\
$git_status\
[](fg:#212736 bg:#161a2b)\
$nodejs\
$bun\
$rust\
$golang\
$php\
$scala\
$java\
$python\
$haskell\
[](fg:#161a2b)\
\n$character"""

# コマンドラインに1行分のスペースを入れない
add_newline = false

# left_promptとright_promptの間を何で埋めるか設定
[fill]
symbol = ' '

[username]
style_user = 'fg:#769ff0 bg:#394260 bold'
style_root = "fg:#e4e4e4 bg:#0a2f32 bold"
format = '[ 󰊠 $user ]($style)'
disabled = false
show_always = true
aliases = {}

[os]
format = "[$symbol]($style)"
style = "fg:#2E3440 bg:#88C0D0 bold"
disabled = false

[os.symbols]
Macos = "  " # nf-fa-apple
Ubuntu = "  " # nf-linux-ubuntu
Debian = "  " # nf-linux-debian

[directory]
style = "fg:#2E3440 bg:#88C0D0 bold"
format = "[ 󰙅  $path ]($style)"
truncation_length = 10
truncate_to_repo = false
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

[aws]
disabled = true
[gcloud]
disabled = true

[git_branch]
symbol = ""
style = "bg:#212736"
format = '[[ $symbol $branch ](fg:#769ff0 bg:#212736)]($style)'

[git_status]
style = "bg:#212736"
format = '[[($all_status$ahead_behind )](fg:#769ff0 bg:#212736)]($style)'

[nodejs]
symbol = "󰎙"
style = "bg:#161a2b"
format = '[[ $symbol ($version) ](fg:#a9b8e8 bg:#161a2b)]($style)'

[bun]
symbol = ""
style = "bg:#161a2b"
format = '[[ $symbol ($version) ](fg:#a9b8e8 bg:#161a2b)]($style)'

[rust]
symbol = ""
style = "bg:#161a2b"
format = '[[ $symbol ($version) ](fg:#a9b8e8 bg:#161a2b)]($style)'

[golang]
symbol = ""
style = "bg:#161a2b"
format = '[[ $symbol ($version) ](fg:#a9b8e8 bg:#161a2b)]($style)'

[php]
symbol = ""
style = "bg:#161a2b"
format = '[[ $symbol ($version) ](fg:#a9b8e8 bg:#161a2b)]($style)'

[scala]
symbol = ""
style = "bg:#161a2b"
format = '[[ $symbol ($version) ](fg:#a9b8e8 bg:#161a2b)]($style)'

[java]
symbol = ""
style = "bg:#161a2b"
format = '[[ $symbol ($version) ](fg:#a9b8e8 bg:#161a2b)]($style)'

[python]
symbol = ""
style = "bg:#161a2b"
format = '[[ $symbol ($version) ](fg:#a9b8e8 bg:#161a2b)]($style)'

[haskell]
symbol = ""
style = "bg:#161a2b"
format = '[[ $symbol ($version) ](fg:#a9b8e8 bg:#161a2b)]($style)'

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "bg:#1d2230"
format = '[[  $time ](fg:#a0a9cb bg:#1d2230)]($style)'

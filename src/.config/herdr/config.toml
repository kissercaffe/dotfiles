onboarding = false

[theme]
name = "tokyo-night"
auto_switch = false

# ---------------------------------------------------------------------------
# Terminal
# ---------------------------------------------------------------------------
[terminal]
default_shell = "bash"
shell_mode = "auto"
new_cwd = "follow"

# ---------------------------------------------------------------------------
# Updates
# ---------------------------------------------------------------------------
[update]
channel = "stable"
version_check = true
manifest_check = true

# ---------------------------------------------------------------------------
# Keybindings
# prefix + 公式推奨の ctrl+alt デュアル
# https://herdr.dev/ja/docs/keyboard/
# ---------------------------------------------------------------------------
[keys]
prefix = "ctrl+g"

help = "prefix+?"
settings = "prefix+s"
detach = "prefix+q"
reload_config = "prefix+shift+r"
open_notification_target = "prefix+o"
workspace_picker = "prefix+w"
goto = "prefix+g"

new_workspace = "prefix+shift+n"
new_worktree = "prefix+shift+g"
rename_workspace = "prefix+shift+w"
close_workspace = "prefix+shift+d"

new_tab = ["prefix+c", "ctrl+alt+c"]
rename_tab = "prefix+shift+t"
previous_tab = ["prefix+p", "ctrl+alt+["]
next_tab = ["prefix+n", "ctrl+alt+]"]
switch_tab = "prefix+1..9"
switch_workspace = "prefix+shift+1..9"
close_tab = "prefix+shift+x"

rename_pane = "prefix+shift+p"
edit_scrollback = "prefix+b"
focus_pane_left = ["prefix+h", "ctrl+alt+h"]
focus_pane_down = ["prefix+j", "ctrl+alt+j"]
focus_pane_up = ["prefix+k", "ctrl+alt+k"]
focus_pane_right = ["prefix+l", "ctrl+alt+l"]
cycle_pane_next = "prefix+tab"
cycle_pane_previous = "prefix+shift+tab"
last_pane = "prefix+semicolon"
split_vertical = ["prefix+v", "ctrl+alt+d"]
split_horizontal = ["prefix+minus", "ctrl+alt+shift+d"]
close_pane = "prefix+x"
zoom = ["prefix+z", "ctrl+alt+z"]
resize_mode = "prefix+r"
toggle_sidebar = "prefix+e"
focus_agent = "prefix+alt+1..9"

navigate_workspace_up = "up"
navigate_workspace_down = "down"
navigate_pane_left = "h"
navigate_pane_down = "j"
navigate_pane_up = "k"
navigate_pane_right = "l"

# ---------------------------------------------------------------------------
# Custom apps
# ---------------------------------------------------------------------------
[[keys.command]]
key = "prefix+alt+g"
type = "popup"
command = "lazygit"
description = "lazygit"
width = "90%"
height = "90%"

[[keys.command]]
key = "prefix+alt+b"
type = "pane"
command = "btop"
description = "btop system monitor"

[[keys.command]]
key = "prefix+t"
type = "pane"
command = "exec \"${SHELL:-bash}\""
description = "scratch terminal"

[[keys.command]]
key = "prefix+alt+c"
type = "pane"
command = "claude"
description = "open Claude Code"

[[keys.command]]
key = "prefix+alt+x"
type = "pane"
command = "codex"
description = "open Codex"

[[keys.command]]
key = "prefix+alt+n"
type = "pane"
command = "nvim ."
description = "open NeoVim"

# herdr-file-viewer: prefix+f で split 起動
[[keys.command]]
key = "prefix+alt+f"
type = "pane"
command = "herdr plugin action invoke open-file-viewer --plugin herdr-file-viewer"
description = "Open file viewer in split pane"

# prefix+shift+f でタブ起動
[[keys.command]]
key = "prefix+shift+f"
type = "shell"
command = "herdr plugin action invoke open-file-viewer-tab --plugin herdr-file-viewer"
description = "Open file viewer in new tab"

# herdr-plugin-hunk: prefix+shif+h で worktree diff
[[keys.command]]
key = "prefix+alt+h"
type = "shell"
command = "herdr plugin action invoke hunk.diff.worktree-split"
description = "Open worktree diff in split pane"
 

# ---------------------------------------------------------------------------
# Worktrees / UI
# ---------------------------------------------------------------------------
[worktrees]
directory = "~/ghq/worktrees"

[ui]
sidebar_width = 28
sidebar_min_width = 18
sidebar_max_width = 40
sidebar_collapsed_mode = "compact"
mouse_capture = true
confirm_close = true
prompt_new_tab_name = true
pane_borders = true
pane_gaps = true
show_agent_labels_on_pane_borders = true
hide_tab_bar_when_single_tab = false
agent_panel_sort = "spaces"

[ui.sidebar.agents]
row_gap = 0
rows = [
  ["state_icon", "agent", "state_text"],
  ["workspace", "tab"],
]

[ui.sidebar.agents.rows_by_agent]
claude = [
  ["state_icon", "agent", "state_text"],
  ["terminal_title_stripped"],
  ["workspace", "tab"],
]
codex = [
  ["state_icon", "agent", "state_text"],
  ["terminal_title_stripped"],
  ["workspace", "tab"],
]

[ui.sidebar.spaces]
row_gap = 0
rows = [
  ["state_icon", "workspace"],
  ["branch", "git_status"],
]

[ui.toast]
delivery = "herdr"
delay_seconds = 1

[ui.toast.herdr]
position = "bottom-right"

[ui.toast.clipboard]
enabled = true
position = "bottom-center"

[ui.sound]
enabled = true

[ui.sound.agents]
droid = "off"
claude = "off"
codex = "off"

[session]
resume_agents_on_restore = true

[remote]
manage_ssh_config = true

